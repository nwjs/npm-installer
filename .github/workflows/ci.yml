name: ci

on:
  pull_request:
    branches:
    - main

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  tests:
    strategy:
      matrix:
        os:
        - macos-26
        - ubuntu-24.04
        - windows-2025
      fail-fast: false
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
      - name: Get Node version from NW.js versions manifest
        run: echo "NODE_VER=$(curl -s https://nwjs.io/versions.json | jq -r ".versions[0].components.node")" >> $GITHUB_ENV
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: ${{ env.NODE_VER }}
          cache: "npm"
      - name: Install third party dependencies
        run: npm ci --nwjs-build-type=sdk
      - name: Check for third party vulnerabilities
        run: npm audit
      - name: Run test suite
        run: npm run test:coverage
      - name: Report Coverage
        if: always()
        uses:  davelosert/vitest-coverage-report-action@v2.11.2
